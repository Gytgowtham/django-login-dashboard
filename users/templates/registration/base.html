<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --green: #00c853;
            --green-dark: #009624;
            --green-dim: rgba(0,200,83,0.1);
            --black: #0a0a0a;
            --sidebar-bg: #0f0f0f;
            --card-bg: #141414;
            --border: rgba(255,255,255,0.07);
            --muted: #666;
            --text: #e8e8e8;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-brand {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 40px; height: 40px;
            background: var(--green);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #000;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0,200,83,0.3);
        }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.25rem 0.75rem;
            overflow-y: auto;
        }

        .nav-section-title {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 0.75rem;
            margin: 1rem 0 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.75rem;
            border-radius: 10px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            position: relative;
        }

        .nav-link i { font-size: 1.1rem; width: 20px; text-align: center; }

        .nav-link:hover {
            background: var(--green-dim);
            color: var(--green);
        }

        .nav-link.active {
            background: var(--green-dim);
            color: var(--green);
            font-weight: 600;
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 3px;
            background: var(--green);
            border-radius: 0 3px 3px 0;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--green);
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 20px;
        }

        .sidebar-footer {
            padding: 1rem 0.75rem;
            border-top: 1px solid var(--border);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
        }

        .user-avatar {
            width: 36px; height: 36px;
            background: var(--green);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-role { font-size: 0.72rem; color: var(--muted); }

        .logout-btn {
            color: var(--muted);
            font-size: 1rem;
            text-decoration: none;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .logout-btn:hover { color: #ff6b6b; }

        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        .topbar-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 2px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .icon-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .icon-btn:hover { background: var(--green-dim); color: var(--green); border-color: var(--green); }

        .notif-dot { position: relative; }
        .notif-dot::after {
            content: '';
            position: absolute;
            top: 6px; right: 6px;
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            border: 2px solid var(--black);
        }

        .page-content { flex: 1; padding: 2rem; }

        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            margin-right: 1rem;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .sidebar-toggle { display: block; }
            .page-content { padding: 1rem; }
        }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <span class="brand-name">MyApp</span>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="{% url 'dashboard' %}" class="nav-link active">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-person-fill"></i> Profile
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-bell-fill"></i> Notifications
            <span class="nav-badge">3</span>
        </a>

        <div class="nav-section-title">Settings</div>
        <a href="#" class="nav-link">
            <i class="bi bi-gear-fill"></i> Settings
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-shield-lock-fill"></i> Security
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-avatar">{{ user.username|first|upper }}</div>
            <div class="user-info">
                <div class="user-name">{{ user.username }}</div>
                <div class="user-role">Administrator</div>
            </div>
            <a href="{% url 'logout' %}" class="logout-btn" title="Logout">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>
</aside>

<div class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <span class="topbar-title">Dashboard</span>
        </div>
        <div class="topbar-actions">
            <a href="#" class="icon-btn notif-dot"><i class="bi bi-bell"></i></a>
            <a href="#" class="icon-btn"><i class="bi bi-search"></i></a>
            <a href="{% url 'logout' %}" class="icon-btn"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
</script>
</body>
</html>
